<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>KLÜP Dış Ticaret | Çin → Türkiye Nakliye</title>
  <meta name="description" content="Çin → Türkiye en uygun nakliye teklifi. Liman seç, WhatsApp'tan teklif al." />
  <meta name="theme-color" content="#0c3a6b" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=11" />
</head>
<body>

  <!-- Boşlukları dolduran: aynı fotoğrafın bulanık hali -->
  <div class="bg"></div>

  <!-- Posterin tamamı (kırpılmadan) -->
  <main class="frame">

    <!-- Mavi işaretli kutu: liman değiştir + WhatsApp teklif al -->
    <section class="panel" aria-label="Teklif al">
      <div class="ports">
        <select id="origin" aria-label="Çıkış limanı"></select>
        <button class="swap" id="swap" type="button" aria-label="Limanların yerini değiştir">⇄</button>
        <select id="dest" aria-label="Varış limanı"></select>
      </div>
      <a href="#" class="teklif-btn" id="teklifBtn">
        <svg viewBox="0 0 32 32" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M16 .4C7.4.4.5 7.3.5 15.9c0 2.8.7 5.4 2 7.8L.4 31.6l8.1-2.1c2.3 1.2 4.8 1.9 7.5 1.9 8.6 0 15.5-6.9 15.5-15.5S24.6.4 16 .4zm7.1 18.6c-.4-.2-2.3-1.1-2.6-1.3-.4-.1-.6-.2-.9.2-.3.4-1 1.3-1.2 1.5-.2.2-.4.3-.8.1-.4-.2-1.6-.6-3.1-1.9-1.1-1-1.9-2.3-2.1-2.7-.2-.4 0-.6.2-.8.2-.2.4-.4.6-.7.2-.2.3-.4.4-.7.1-.3.1-.5 0-.7-.1-.2-.9-2.2-1.3-3-.3-.8-.7-.7-.9-.7h-.8c-.3 0-.7.1-1.1.5s-1.5 1.4-1.5 3.5 1.5 4.1 1.7 4.4c.2.3 3 4.6 7.3 6.4 1 .4 1.8.7 2.4.9 1 .3 1.9.3 2.6.2.8-.1 2.3-1 2.7-1.9.3-.9.3-1.7.2-1.9z"/></svg>
        WhatsApp'ta Teklif Al
      </a>
    </section>

  </main>

  <!-- Teklif öncesi adım adım form -->
  <div class="modal" id="modal" hidden>
    <div class="modal-card" role="dialog" aria-modal="true" aria-label="Teklif formu">
      <button class="modal-close" id="modalClose" aria-label="Kapat">×</button>
      <div class="steps-top">
        <button class="step-back" id="stepBack" type="button" aria-label="Geri" hidden>‹</button>
        <div class="dots" id="dots"></div>
      </div>

      <div class="viewport">
        <div class="track" id="track">

          <div class="slide">
            <div class="q" data-q="ithalat">
              <p class="q-title">Aktif olarak ithalat yapıyor musunuz?</p>
              <div class="opts">
                <button class="opt" type="button" data-val="Evet">Evet</button>
                <button class="opt" type="button" data-val="Hayır">Hayır</button>
              </div>
            </div>
          </div>

          <div class="slide">
            <div class="q" data-q="konteyner">
              <p class="q-title">Yılda kaç konteyner mal alıyorsunuz?</p>
              <div class="opts">
                <button class="opt" type="button" data-val="1-3">1-3</button>
                <button class="opt" type="button" data-val="3-5">3-5</button>
                <button class="opt" type="button" data-val="5-7">5-7</button>
                <button class="opt" type="button" data-val="7+">7+</button>
              </div>
            </div>
          </div>

          <div class="slide">
            <div class="q" data-q="zaman">
              <p class="q-title">Ne zaman sevkiyat planlıyorsunuz?</p>
              <div class="opts">
                <button class="opt" type="button" data-val="Hemen">Hemen</button>
                <button class="opt" type="button" data-val="1 ay içinde">1 ay içinde</button>
                <button class="opt" type="button" data-val="1-3 ay içinde">1-3 ay içinde</button>
                <button class="opt" type="button" data-val="Araştırıyorum">Araştırıyorum</button>
              </div>
            </div>
          </div>

          <div class="slide slide-final">
            <div class="final-icon">✓</div>
            <h3>Bilgileriniz hazır!</h3>
            <p class="final-sub">Size en uygun fiyatı WhatsApp'tan hemen iletelim.</p>
            <button class="modal-submit" id="modalSubmit" type="button">
              <svg viewBox="0 0 32 32" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M16 .4C7.4.4.5 7.3.5 15.9c0 2.8.7 5.4 2 7.8L.4 31.6l8.1-2.1c2.3 1.2 4.8 1.9 7.5 1.9 8.6 0 15.5-6.9 15.5-15.5S24.6.4 16 .4zm7.1 18.6c-.4-.2-2.3-1.1-2.6-1.3-.4-.1-.6-.2-.9.2-.3.4-1 1.3-1.2 1.5-.2.2-.4.3-.8.1-.4-.2-1.6-.6-3.1-1.9-1.1-1-1.9-2.3-2.1-2.7-.2-.4 0-.6.2-.8.2-.2.4-.4.6-.7.2-.2.3-.4.4-.7.1-.3.1-.5 0-.7-.1-.2-.9-2.2-1.3-3-.3-.8-.7-.7-.9-.7h-.8c-.3 0-.7.1-1.1.5s-1.5 1.4-1.5 3.5 1.5 4.1 1.7 4.4c.2.3 3 4.6 7.3 6.4 1 .4 1.8.7 2.4.9 1 .3 1.9.3 2.6.2.8-.1 2.3-1 2.7-1.9.3-.9.3-1.7.2-1.9z"/></svg>
              WhatsApp'ta Fiyat Al
            </button>
          </div>

        </div>
      </div>
    </div>
  </div>

  <script src="script.js?v=10"></script>
</body>
</html>
